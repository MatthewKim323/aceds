app = "ace-backend"
primary_region = "sjc"

[build]

[env]
  ACE_ENV = "production"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.checks]
    [http_service.checks.health]
      type = "http"
      method = "get"
      path = "/health"
      interval = "30s"
      timeout = "5s"
      grace_period = "10s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
